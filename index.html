<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计划表</title>
    <!-- 引入驱动引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 引入 SheetJS 用于 Excel 导出 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* 隐藏原生滚动条，保持界面纯净 */
        .scrollbar-hidden::-webkit-scrollbar { display: none; }
        .scrollbar-hidden { -ms-overflow-style: none; scrollbar-width: none; }
        
        body { 
            background-color: #f1f5f9; 
            overflow: hidden; 
            margin: 0;
            height: 100vh;
        }

        /* 左侧固定列：维度标识 */
        .sticky-col {
            position: sticky;
            left: 0;
            z-index: 50;
            background: white;
            box-shadow: 6px 0 15px -5px rgba(0,0,0,0.08);
            user-select: none; /* 仅固定区域禁止选择 */
        }
        
        .tap-active:active { transform: scale(0.96); transition: 0.1s; }
        
        /* 内部 Textarea 自定义微型滚动条 */
        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* 时间控件优化：确保点击灵敏度 */
        input[type="time"] {
            position: relative;
            cursor: pointer;
            pointer-events: auto;
        }
        input[type="time"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // 内联星号组件
        const StarIcon = ({ filled, onClick, size = 26 }) => (
            <svg 
                onClick={(e) => { e.stopPropagation(); onClick(); }}
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                className={`cursor-pointer transition-all hover:scale-125 ${filled ? 'drop-shadow-sm' : ''}`}
            >
                <polygon 
                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                    fill={filled ? "#fbbf24" : "none"}
                    stroke={filled ? "#fbbf24" : "#cbd5e1"}
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                />
            </svg>
        );

        const LucideIcon = ({ name, size = 18, className = "" }) => (
            <i data-lucide={name} className={`inline-block ${className}`} style={{ width: size, height: size, verticalAlign: 'middle' }}></i>
        );

        const App = () => {
            const [year, setYear] = useState(new Date().getFullYear());
            const [month, setMonth] = useState(new Date().getMonth());
            const [data, setData] = useState({});
            const [showToast, setShowToast] = useState(false);
            const [toastMsg, setToastMsg] = useState('');
            const [previewImage, setPreviewImage] = useState(null);
            
            const mainScrollRef = useRef(null);

            const storageKey = `monthly_planner_v18_1_${year}_${month}`;
            const daysInMonth = useMemo(() => new Date(year, month + 1, 0).getDate(), [year, month]);

            useEffect(() => {
                const saved = localStorage.getItem(storageKey);
                setData(saved ? JSON.parse(saved) : {});
                setTimeout(() => lucide.createIcons(), 50);
            }, [storageKey]);

            useEffect(() => { lucide.createIcons(); });

            // 垂直滚轮映射
            const handleWheelMapping = (e) => {
                if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
                    if (mainScrollRef.current) {
                        mainScrollRef.current.scrollLeft += e.deltaY;
                    }
                }
            };

            const stats = useMemo(() => {
                let restDays = 0, leaveHours = 0;
                for (let i = 1; i <= daysInMonth; i++) {
                    if (data[`${i}-rest`]) restDays++;
                    if (data[`${i}-leave`]) {
                        const start = data[`${i}-leave-start`], end = data[`${i}-leave-end`];
                        if (start && end) {
                            const [sH, sM] = start.split(':').map(Number), [eH, eM] = end.split(':').map(Number);
                            const diff = (eH * 60 + eM) - (sH * 60 + sM);
                            if (diff > 0) leaveHours += diff / 60;
                        }
                    }
                }
                return { restDays, leaveHours: leaveHours.toFixed(1) };
            }, [data, daysInMonth]);

            const getDayInfo = (d) => {
                const date = new Date(year, month, d), dayOfWeek = date.getDay();
                const weekNames = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
                const holidays = { "1-1": "元旦", "5-1": "劳动节", "10-1": "国庆", "12-25": "圣诞" };
                return { weekName: weekNames[dayOfWeek], isWeekend: dayOfWeek === 0 || dayOfWeek === 6, holiday: holidays[`${month+1}-${d}`] || "" };
            };

            const updateField = (day, field, value) => {
                setData(prev => ({ ...prev, [`${day}-${field}`]: value }));
            };

            const handleSave = () => {
                localStorage.setItem(storageKey, JSON.stringify(data));
                setToastMsg('数据已安全存档'); setShowToast(true);
                setTimeout(() => setShowToast(false), 2000);
            };

            const exportToExcel = () => {
                const workbook = XLSX.utils.book_new();
                const sheetData = [["日期", "星期", "节假日", "工作状态", "紧急度", "任务布置", "当日计划", "完成情况", "休息备注", "请假时段", "请假说明"]];

                for (let i = 1; i <= daysInMonth; i++) {
                    const info = getDayInfo(i);
                    sheetData.push([
                        `${i}号`, info.weekName, info.holiday || "", 
                        data[`${i}-rest`] ? "休息" : "工作中",
                        data[`${i}-task-priority`] ? `${data[`${i}-task-priority`]}星` : "未标",
                        data[`${i}-task`] || "", data[`${i}-plan`] || "", data[`${i}-status`] || "",
                        data[`${i}-rest-note`] || "",
                        data[`${i}-leave`] ? `${data[`${i}-leave-start`] || ''} ~ ${data[`${i}-leave-end`] || ''}` : "无",
                        data[`${i}-leave-desc`] || ""
                    ]);
                }

                const worksheet = XLSX.utils.aoa_to_sheet(sheetData);
                worksheet['!cols'] = [{wch:8},{wch:8},{wch:10},{wch:10},{wch:8},{wch:40},{wch:40},{wch:40},{wch:30},{wch:20},{wch:30}];
                XLSX.utils.book_append_sheet(workbook, worksheet, "生命复盘");
                XLSX.writeFile(workbook, `${year}年${month+1}月生命审计报告.xlsx`);
            };

            const handleImage = (day, field, e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const key = `${day}-${field}-imgs`;
                        setData(prev => ({ ...prev, [key]: [...(prev[key] || []), reader.result] }));
                    };
                    reader.readAsDataURL(file);
                });
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden text-slate-800">
                    
                    {/* 1. 顶部导航 */}
                    <header className="bg-white p-3 px-6 border-b border-slate-200 z-[80] flex justify-between items-center shadow-sm shrink-0 h-14 user-select-none">
                        <div className="flex items-center gap-4 scale-90 origin-left">
                            <div className="flex items-center bg-slate-50 p-1 rounded-xl border border-slate-200 shadow-sm">
                                <select value={year} onChange={e => setYear(Number(e.target.value))} className="bg-transparent px-3 py-1 font-black text-slate-700 text-base outline-none cursor-pointer">
                                    {[2024, 2025, 2026].map(y => <option key={y} value={y}>{y} 年</option>)}
                                </select>
                                <select value={month} onChange={e => setMonth(Number(e.target.value))} className="bg-transparent px-3 py-1 font-black text-purple-600 text-base outline-none cursor-pointer">
                                    {["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"].map((m, i) => <option key={i} value={i}>{m}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="flex items-center gap-3 scale-90 origin-right">
                            <button onClick={handleSave} className="tap-active flex items-center gap-2 px-6 py-2 bg-slate-900 text-white rounded-xl font-bold hover:bg-black transition-all shadow-lg text-base">
                                <LucideIcon name="save" size={16} /> 保存
                            </button>
                            <button onClick={exportToExcel} className="tap-active flex items-center gap-2 px-6 py-2 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 transition-all shadow-lg text-base">
                                <LucideIcon name="file-spreadsheet" size={16} /> Excel 导出
                            </button>
                            <button onClick={() => window.confirm('重置当前月份？') && setData({})} className="p-2 text-slate-300 hover:text-red-500 transition-colors">
                                <LucideIcon name="trash-2" size={22} />
                            </button>
                        </div>
                    </header>

                    {/* 2. 内容画布 */}
                    <main 
                        ref={mainScrollRef}
                        onWheel={handleWheelMapping}
                        className="flex-1 overflow-x-auto overflow-y-hidden bg-slate-50 scrollbar-hidden"
                    >
                        <table className="border-collapse table-fixed w-max h-full">
                            <thead className="sticky top-0 z-[60] user-select-none">
                                <tr className="bg-white border-b border-slate-200 shadow-sm h-14">
                                    <th className="sticky-col p-2 px-4 text-left font-black text-slate-400 w-56 text-base uppercase border-r bg-white">全景时间轴</th>
                                    {[...Array(daysInMonth)].map((_, i) => {
                                        const info = getDayInfo(i + 1);
                                        return (
                                            <th key={i} className={`px-4 border-r border-slate-100 w-[380px] ${info.isWeekend ? 'bg-slate-50/60' : ''}`}>
                                                <div className="flex items-center justify-center gap-4">
                                                    <span className="text-4xl font-black text-slate-900">{i + 1}</span>
                                                    <span className={`text-base font-black ${info.isWeekend ? 'text-orange-500' : 'text-slate-400'}`}>{info.weekName}</span>
                                                    {info.holiday && <span className="px-2 py-0.5 bg-red-500 text-white text-xs font-bold rounded-sm ml-1">{info.holiday}</span>}
                                                </div>
                                            </th>
                                        );
                                    })}
                                </tr>
                            </thead>
                            <tbody>
                                {/* 任务行 */}
                                <tr className="border-b border-slate-100 bg-purple-50/5 h-[21%]">
                                    <td className="sticky-col p-4 border-r border-slate-200 font-black text-lg text-purple-800 bg-white shadow-sm">
                                        <div className="flex items-center gap-2"><LucideIcon name="inbox" size={20} /> 任务布置</div>
                                    </td>
                                    {[...Array(daysInMonth)].map((_, i) => (
                                        <td key={i} className={`p-4 border-r border-slate-50 align-top ${data[`${i+1}-rest`] ? 'bg-slate-100/60 opacity-20' : 'bg-white'}`}>
                                            <div className="flex flex-col gap-2 h-full">
                                                <div className="flex items-center gap-3 p-1 bg-slate-50 rounded-lg border border-slate-200 w-fit">
                                                    <div className="flex items-center gap-1">
                                                        {[1, 2, 3].map(lvl => (
                                                            <StarIcon 
                                                                key={lvl} level={lvl} 
                                                                filled={(data[`${i+1}-task-priority`] || 0) >= lvl} 
                                                                onClick={() => !data[`${i+1}-rest`] && updateField(i+1, 'task-priority', lvl)}
                                                                size={24}
                                                            />
                                                        ))}
                                                    </div>
                                                    <span className="text-[8px] font-black text-slate-300 uppercase px-1">紧急度</span>
                                                </div>
                                                <textarea className="w-full h-full p-2 text-[11px] bg-transparent border-none rounded-xl resize-none font-bold text-slate-600 outline-none shadow-inner" placeholder="..." value={data[`${i+1}-task`]||''} disabled={data[`${i+1}-rest`]} onChange={e => updateField(i+1, 'task', e.target.value)} />
                                            </div>
                                        </td>
                                    ))}
                                </tr>
                                {/* 计划与复盘 */}
                                <ContentRow dayCount={daysInMonth} field="plan" title="当日计划" icon="clipboard-list" color="blue" data={data} updateField={updateField} handleImage={handleImage} setPreview={setPreviewImage} />
                                <ContentRow dayCount={daysInMonth} field="status" title="完成情况" icon="check-circle-2" color="emerald" data={data} updateField={updateField} handleImage={handleImage} setPreview={setPreviewImage} />
                                
                                {/* 休息状态 */}
                                <tr className="border-b border-slate-100 bg-white h-[11%]">
                                    <td className="sticky-col px-4 border-r border-slate-200 font-black text-sm text-orange-600 uppercase bg-white shadow-sm">休息状态</td>
                                    {[...Array(daysInMonth)].map((_, i) => (
                                        <td key={i} className={`px-4 border-r border-slate-100 transition-all w-[380px] ${data[`${i+1}-rest`]?'bg-orange-50/50':'bg-white'}`}>
                                            <div className="flex items-center gap-6 h-full">
                                                <label className="inline-flex items-center cursor-pointer relative shrink-0 scale-110">
                                                    <input type="checkbox" className="sr-only peer" checked={data[`${i+1}-rest`]||false} onChange={e => updateField(i+1, 'rest', e.target.checked)} />
                                                    <div className="w-8 h-4 bg-slate-200 rounded-full peer-checked:bg-orange-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:after:translate-x-4"></div>
                                                </label>
                                                <div className="flex-1 flex items-center gap-3 bg-slate-50 p-2 rounded-xl border border-slate-100 shadow-inner h-9">
                                                    <LucideIcon name="edit-3" size={14} className="text-orange-300" />
                                                    <input type="text" className="bg-transparent text-[11px] font-bold text-slate-500 outline-none w-full placeholder:text-slate-200" placeholder="备注..." value={data[`${i+1}-rest-note`] || ''} onChange={e => updateField(i+1, 'rest-note', e.target.value)} />
                                                </div>
                                            </div>
                                        </td>
                                    ))}
                                </tr>

                                {/* 请假调休 - 深度修复交互通路 */}
                                <tr className="border-b border-slate-100 bg-indigo-50/5 h-[11%]">
                                    <td className="sticky-col px-4 border-r border-slate-200 font-black text-sm text-indigo-700 uppercase bg-white shadow-sm">请假调休</td>
                                    {[...Array(daysInMonth)].map((_, i) => (
                                        <td key={i} className={`px-4 border-r border-slate-100 transition-all w-[380px] ${data[`${i+1}-leave`]?'bg-indigo-50/20':'bg-white'}`}>
                                            <div className="flex items-center justify-between gap-4 h-full">
                                                <label className="flex items-center gap-2 cursor-pointer shrink-0 scale-105">
                                                    <input type="checkbox" className="w-4 h-4 rounded border border-slate-200 text-indigo-600 focus:ring-0 shadow-sm" checked={data[`${i+1}-leave`]||false} onChange={(e) => updateField(i+1, 'leave', e.target.checked)} />
                                                    <span className="text-[10px] font-black text-slate-400">记录</span>
                                                </label>
                                                {data[`${i+1}-leave`] && (
                                                    <div className="flex-1 flex items-center gap-2 animate-in fade-in slide-in-from-right-2 pointer-events-auto">
                                                        <div className="flex items-center gap-1 bg-white/90 p-1 rounded-lg border border-indigo-200 shadow-sm">
                                                            {/* 显式声明 pointer-events-auto 确保不被 select-none 干扰 */}
                                                            <input 
                                                                type="time" 
                                                                className="bg-transparent text-[11px] font-black outline-none w-16 pointer-events-auto" 
                                                                value={data[`${i+1}-leave-start`] || ''} 
                                                                onChange={(e) => updateField(i+1, 'leave-start', e.target.value)} 
                                                            />
                                                            <span className="text-slate-300 text-[10px]">~</span>
                                                            <input 
                                                                type="time" 
                                                                className="bg-transparent text-[11px] font-black outline-none w-16 pointer-events-auto" 
                                                                value={data[`${i+1}-leave-end`] || ''} 
                                                                onChange={(e) => updateField(i+1, 'leave-end', e.target.value)} 
                                                            />
                                                        </div>
                                                        <input 
                                                            type="text" 
                                                            className="flex-1 p-1 bg-white border border-indigo-100 rounded-lg text-[10px] font-bold text-slate-500 outline-none h-7 pointer-events-auto" 
                                                            placeholder="事由" 
                                                            value={data[`${i+1}-leave-desc`] || ''} 
                                                            onChange={(e) => updateField(i+1, 'leave-desc', e.target.value)} 
                                                        />
                                                    </div>
                                                )}
                                            </div>
                                        </td>
                                    ))}
                                </tr>
                            </tbody>
                        </table>
                    </main>

                    {/* 3. 底部统计面板 - 强化特大号显示 */}
                    <footer className="bg-slate-900 p-3 z-[75] shadow-2xl shrink-0 flex items-center justify-center gap-24 h-24 border-t border-slate-800 user-select-none">
                        <StatBox icon="coffee" title="本月累计休息" value={stats.restDays} unit="天" color="orange" />
                        <StatBox icon="user-check" title="请假时长累计" value={stats.leaveHours} unit="小时" color="indigo" />
                    </footer>

                    {/* 图片预览 */}
                    {previewImage && (
                        <div className="fixed inset-0 z-[200] bg-black/98 backdrop-blur-md flex items-center justify-center p-10 cursor-zoom-out" onClick={() => setPreviewImage(null)}>
                            <img src={previewImage} alt="Preview" className="max-w-full max-h-full rounded-xl shadow-2xl ring-4 ring-white/10 animate-in zoom-in-95 duration-300" />
                        </div>
                    )}
                    
                    {/* Toast */}
                    {showToast && (
                        <div className="fixed bottom-32 left-1/2 -translate-x-1/2 bg-white text-slate-900 border border-slate-200 px-8 py-3 rounded-full shadow-2xl z-[210] flex items-center gap-4 animate-in slide-in-from-bottom-5">
                            <LucideIcon name="check-circle-2" className="text-emerald-500 scale-[1.3]" />
                            <span className="font-bold text-lg tracking-widest">{toastMsg}</span>
                        </div>
                    )}
                </div>
            );
        };

        const ContentRow = ({ dayCount, field, title, icon, color, data, updateField, handleImage, setPreview }) => (
            <tr className="border-b border-slate-100 h-[22%]">
                <td className="sticky-col p-4 border-r border-slate-200 font-black text-lg shadow-sm bg-white">
                    <div className={`flex items-center gap-3 text-${color}-800`}><LucideIcon name={icon} size={18} /> {title}</div>
                </td>
                {[...Array(dayCount)].map((_, i) => {
                    const day = i + 1, isRest = data[`${day}-rest`], images = data[`${day}-${field}-imgs`] || [];
                    return (
                        <td key={i} className={`p-4 border-r border-slate-50 align-top transition-all ${isRest ? 'bg-slate-100/60 opacity-20' : 'bg-white hover:bg-slate-50/50'}`}>
                            <div className="flex flex-col h-full gap-2">
                                <textarea 
                                    className={`w-full flex-1 p-3 text-[11px] bg-transparent border-none rounded-xl resize-none text-slate-600 font-bold outline-none shadow-inner focus:ring-1 ${color === 'blue' ? 'focus:ring-blue-200' : 'focus:ring-emerald-200'} pointer-events-auto`} 
                                    placeholder="..." 
                                    value={data[`${day}-${field}`]||''} 
                                    disabled={isRest} 
                                    onChange={e => updateField(day, field, e.target.value)} 
                                />
                                <div className="flex flex-wrap gap-2 shrink-0">
                                    {images.map((img, idx) => (
                                        <div key={idx} className="relative group w-10 h-10 rounded border-2 border-white shadow-sm hover:scale-110 transition-all cursor-pointer overflow-hidden">
                                            <img src={img} className="w-full h-full object-cover" onClick={() => setPreview(img)} />
                                            <button onClick={(e) => {
                                                e.stopPropagation();
                                                const newImgs = [...images]; newImgs.splice(idx, 1);
                                                updateField(day, `${field}-imgs`, newImgs);
                                            }} className="absolute top-0 right-0 bg-red-500 text-white p-0.5 rounded-bl opacity-0 group-hover:opacity-100 leading-none">
                                                <span className="text-[10px]">×</span>
                                            </button>
                                        </div>
                                    ))}
                                    {!isRest && (
                                        <label className="flex items-center justify-center w-10 h-10 rounded bg-slate-50 text-slate-300 border border-dashed border-slate-200 cursor-pointer hover:bg-slate-100 shrink-0">
                                            <LucideIcon name="image" size={12} />
                                            <input type="file" accept="image/*" multiple className="hidden" onChange={e => handleImage(day, field, e)} />
                                        </label>
                                    )}
                                </div>
                            </div>
                        </td>
                    );
                })}
            </tr>
        );

        // 强化后的特大号统计卡片组件
        const StatBox = ({ icon, title, value, unit, color }) => (
            <div className="bg-white/5 rounded-2xl p-4 px-16 flex items-center gap-10 border-2 border-white/10 transition-all hover:bg-white/10">
                <LucideIcon name={icon} size={40} className={`text-${color}-400 scale-[1.5]`} />
                <div>
                    <div className="text-slate-400 text-sm font-black uppercase mb-2 tracking-[0.2em] leading-none">{title}</div>
                    <div className="text-6xl font-black text-white leading-none tracking-tight">
                        {value} <span className="text-2xl font-bold text-slate-600 ml-2">{unit}</span>
                    </div>
                </div>
            </div>
        );

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
